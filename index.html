<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo 2026 - LITHIUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <header class="site-header inicio">
        <!-- Carrusel de Fondo -->
        <div class="carrusel-fondo">
            <div class="slide-carrusel active" style="background-image: url('img/1.jpg');"></div>
            <div class="slide-carrusel" style="background-image: url('img/10.jpg');"></div>
            <div class="slide-carrusel" style="background-image: url('img/14.jpg');"></div>
            <div class="slide-carrusel" style="background-image: url('img/: 4px;');"></div>
        </div>
        <!-- Overlay -->
        <div class="carrusel-overlay"></div>
        
        <div class="contenedor contenedor-header">
            <div class="barra">
                <a href="index.html">
                    <img src="img/logo_lithium.svg" alt="Logo_lithium">
                </a>
                <div class="mobile-menu">
                    <a href="#navegacion">
                        <img src="img/barras.svg" alt="Icono Menu">
                    </a>
                </div>
                <nav id="navegacion" class="navegacion">
                    <a href="medios.html">Galería</a>
                    <a href="redes.html">Redes</a>
                </nav>
            </div>
            <div class="hero-texto">
                <h1>Las Iluciones Trazadas hoy iluminaran un mañana</h1>
                <p>Galería y redes sociales de nuestra promoción.</p>
                <a href="medios.html" class="boton boton-amarillo">Ver galería</a>
            </div>
        </div>
    </header>

    <script>
        // Carrusel automático
        let slideActual = 0;
        const slides = document.querySelectorAll('.slide-carrusel');
        
        function mostrarSlide(index) {
            slides.forEach(slide => slide.classList.remove('active'));
            slides[index].classList.add('active');
        }
        
        function siguienteSlide() {
            slideActual = (slideActual + 1) % slides.length;
            mostrarSlide(slideActual);
        }
        
        setInterval(siguienteSlide, 5000); // Cambiar cada 5 segundos
    </script>

    <main class="contenedor seccion">
        <h2 class="fw-300 centrar-texto">Conoce Nuestra Historia</h2>
        <div class="contenedor-imagenes">
            <div id="galeria" class="galeria-grid"></div>
        </div>
    </main>

    <footer class="site-footer seccion">
    <div class="contenedor contenedor-footer">
        <nav class="navegacion">
            <a href="index.html">Inicio</a>
            <a href="medios.html">Galería</a>
            <a href="redes.html">Redes</a>
        </nav>
        <p class="copyrigth">
            Todos los derechos reservados 2026 ©
        </p>
    </div>
</footer>
</body>
</html>
