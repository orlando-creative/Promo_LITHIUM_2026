<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo 2026 - LITHIUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <header class="site-header inicio">
        <div class="swiper swiper-hero">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="img/1.jpg" alt=""></div>
                <div class="swiper-slide"><img src="img/8.jpg" alt=""></div>
                <div class="swiper-slide"><img src="img/3.jpg" alt=""></div>
            </div>
        </div>

        <div class="contenedor contenedor-header">
            <div class="barra">
                <a href="index.html">
                    <img src="img/logo_lithium.svg" alt="Logo_lithium">
                </a>
                <div class="mobile-menu">
                    <a href="#navegacion">
                        <img src="img/barras.svg" alt="Icono Menu">
                    </a>
                </div>
                <nav id="navegacion" class="navegacion">
                    <a href="medios.html">Galería</a>
                    <a href="redes.html">Redes</a>
                </nav>
            </div>
            <div class="hero-texto">
                <h1>Las Iluciones Trazadas hoy iluminaran un mañana</h1>
                <p>Galería y redes sociales de nuestra promoción.</p>
                <a href="medios.html" class="boton boton-amarillo">Ver galería</a>
            </div>
            <!-- Controles de Swiper en el contenedor superior para interactividad -->
            <div class="swiper-pagination"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-button-next"></div>
        </div>
    </header>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper', {
            loop: true,
            effect: 'fade',
            speed: 1200,
            autoplay: {
                delay: 5000,
                disableOnInteraction: false,
            },
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
        });
    </script>

    <main class="contenedor seccion">
        <h2 class="fw-300 centrar-texto">Conoce Nuestra Historia</h2>
        <div class="contenedor-imagenes">
            <div id="galeria-grid" class="galeria-grid"></div>
        </div>
    </main>

    <footer class="site-footer seccion">
    <div class="contenedor contenedor-footer">
        <nav class="navegacion">
            <a href="index.html">Inicio</a>
            <a href="medios.html">Galería</a>
            <a href="redes.html">Redes</a>
        </nav>
        <p class="copyrigth">
            Todos los derechos reservados 2026 ©
        </p>
    </div>
</footer>
</body>
<script src="js/script.js"></script>
</html>
