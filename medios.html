<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos y Videos - Galería</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="contenedor contenedor-header">
            <div class="barra">
                <a href="index.html">
                    <img src="img/logo_lithium.svg" alt="Logo LITHIUM">
                </a>
                <div class="mobile-menu">
                    <a href="#navegacion">
                        <img src="img/barras.svg" alt="icono menu">
                    </a>
                </div>
                <nav id="navegacion" class="navegacion">
                    <a href="index.html">Inicio</a>
                    <a href="medios.html">Galería</a>
                    <a href="redes.html">Redes</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="contenedor seccion">
        <h1 class="titulo-vintage centrar-texto">Galería de Fotos y Videos</h1>
        <p class="subtitulo-vintage centrar-texto">Revive los mejores momentos de nuestra promoción</p>



        <div id="galeria-grid" class="galeria-grid"></div>

        <div id="lightbox" class="lightbox" aria-hidden="true">
            <button class="lightbox-close" aria-label="Cerrar">×</button>
            <button class="lightbox-prev" aria-label="Anterior">‹</button>
            <div class="lightbox-content">
                <img src="" alt="" class="lightbox-img">
                <div class="lightbox-caption"></div>
            </div>
            <button class="lightbox-next" aria-label="Siguiente">›</button>
        </div>
        
        <div class="formulario-subida" style="max-width: 500px; margin: 0 auto 40px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; text-align: center;">
            <h3 style="margin-top: 0;">Añadir Foto a la Galería</h3>
            <form id="form-subir-foto">
                <input type="text" id="input-titulo" placeholder="Título del recuerdo (Ej: Convivio)" required style="width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box;">
                <input type="file" id="input-archivo" accept="image/*" required style="width: 100%; margin-bottom: 10px;">
                <label style="display: block; margin-bottom: 15px;">
                    <input type="checkbox" id="input-grande"> ¿Destacar como imagen grande?
                </label>
                <button type="submit" id="btn-subir" class="boton boton-amarillo" style="width: 100%; cursor: pointer;">Subir Foto</button>
            </form>
            <p id="mensaje-estado" style="margin-top: 10px; font-weight: bold;"></p>
        </div>
        <div class="seccion-mas-contenido">
            <p>¿Quieres ver más? Visita nuestras redes sociales para las galerías completas</p>
            <a href="redes.html" class="boton boton-amarillo">Ver en Redes</a>
        </div>
    </main>

    <footer class="site-footer seccion">
        <div class="contenedor contenedor-footer">
            <nav class="navegacion">
                <a href="index.html">Inicio</a>
                <a href="medios.html">Galería</a>
                <a href="redes.html">Redes</a>
            </nav>
            <p class="copyrigth">
                Promo 2026 LITHIUM © Todos los derechos reservados
            </p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
